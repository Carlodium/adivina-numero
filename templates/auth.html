<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Carlodium Arcade</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Animation -->
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <div class="container" style="max-width: 400px; margin-top: 5vh;">
        <a href="/" class="back-link">⬅️ Volver al Hub</a>
        
        <div class="game-card" style="text-align: center;">
            <h1 style="margin-bottom: 1rem;">🔐 Acceso Arcade</h1>
            
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Iniciar Sesión</button>
                <button class="auth-tab" id="tab-register">Registrarse</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <input type="text" id="login-username" placeholder="Usuario" required autocomplete="username">
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" class="play-btn" style="width: 100%; border: none; cursor: pointer;">Entrar</button>
                <p id="login-error" class="error-msg"></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden">
                <div class="input-group">
                    <input type="text" id="reg-username" placeholder="Elige tu Nick" required autocomplete="username" maxlength="16">
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" placeholder="Contraseña" required autocomplete="new-password">
                </div>
                <button type="submit" class="play-btn" style="width: 100%; border: none; cursor: pointer;">Crear Cuenta</button>
                <p id="reg-error" class="error-msg"></p>
            </form>
        </div>
    </div>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        // Tab Switching
        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });

        // Login Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message;
                }
            } catch (err) {
                errorMsg.textContent = "Error de conexión";
            }
        });

        // Register Logic
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const errorMsg = document.getElementById('reg-error');

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                
                if (data.success) {
                    // Auto login success
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message;
                }
            } catch (err) {
                errorMsg.textContent = "Error de conexión";
            }
        });
    </script>

    <style>
        .auth-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .auth-tab {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: 'Outfit', sans-serif;
        }
        .error-msg {
            color: #ef4444;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</body>
</html>
