<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Versus - Carlodium Arcade</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='game.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='versus.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <!-- Theme Toggle -->
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round">
                <div class="slider-knob">
                    <span class="icon-moon">🌙</span>
                    <span class="icon-sun">☀️</span>
                </div>
            </div>
        </label>
    </div>

    <div class="game-auth-status">
      {% if session.get('user_id') %}
        <span class="username-display">👤 {{ session.get('username') }}</span>
        <a href="/logout" class="btn-auth btn-logout" id="logout-link">Cerrar Sesión</a>
      {% else %}
        <a href="/auth?tab=login" class="btn-auth btn-login">Iniciar Sesión</a>
        <a href="/auth?tab=register" class="btn-auth btn-register">Registrarse</a>
      {% endif %}
    </div>
    <!-- Dynamic Stars via stars.js -->

    <div class="container lobby-wrapper">
        <div class="lobby-header-bar">
            <a href="/" class="back-link">⬅️ Volver al Hub</a>
            
            <!-- Countdown Badge (Moved here) -->
            <div id="countdown-layer" class="countdown-badge hidden">
                <div class="countdown-number" id="countdown-num">3</div>
                <div class="countdown-text">Iniciando...</div>
            </div>
        </div>

        <!-- MENU INICIAL -->
        <div id="menu-section" class="game-card menu-card">
            <h1>⚔️ Modo Versus</h1>
            <button id="btn-create" class="play-btn">Crear Sala</button>
            <div style="margin: 1rem 0; font-weight: bold;">- O -</div>
            <div class="input-group">
                <input type="text" id="room-code-input" placeholder="Código" maxlength="4" style="text-transform: uppercase; text-align: center; letter-spacing: 5px;">
            </div>
            <button id="btn-join" class="play-btn secondary">Unirse</button>
        </div>

        <!-- LOBBY (Hidden initially) -->
        <div id="lobby-section" class="lobby-grid hidden">
            
            <!-- LEFT: AVATAR STAGE -->
            <div class="game-card stage-card">
                <div class="room-header">
                    <h3>Sala: <span id="display-room-code">????</span></h3>
                    <p id="lobby-status">Esperando jugadores...</p>
                </div>

                <div class="avatar-stage" id="avatar-stage">
                    <!-- P1 -->
                    <div class="avatar-container" id="p1-container">
                        <div class="avatar-cube" id="p1-avatar">
                            <div class="face">
                                <div class="eyes">
                                    <div class="eye left">
                                        <div class="pupil"></div>
                                    </div>
                                    <div class="eye right">
                                        <div class="pupil"></div>
                                    </div>
                                </div>
                                <div class="mouth"></div>
                            </div>
                        </div>
                        <div class="player-name p1-name" id="p1-name">Jugador 1</div>
                    </div>

                    <!-- VS Badge -->
                    <div class="vs-badge">VS</div>

                    <!-- P2 -->
                    <div class="avatar-container" id="p2-container">
                        <div class="avatar-cube" id="p2-avatar">
                            <div class="face">
                                <div class="eyes">
                                    <div class="eye left">
                                        <div class="pupil"></div>
                                    </div>
                                    <div class="eye right">
                                        <div class="pupil"></div>
                                    </div>
                                </div>
                                <div class="mouth"></div>
                            </div>
                        </div>
                        <div class="player-name p2-name" id="p2-name">Esperando...</div>
                    </div>
                </div>

                <!-- Player List -->
                <div class="player-list-container">
                    <h4>Jugadores en sala:</h4>
                    <ul class="player-list" id="player-list">
                        <!-- Players will be added here dynamically -->
                    </ul>
                </div>

                <div class="controls-area">
                    <div id="ready-count" style="margin-bottom: 0.5rem; font-weight: bold; color: var(--text-muted);">0/2 Listos</div>
                    <button id="btn-ready" class="play-btn ready-btn">¡ESTOY LISTO!</button>
                </div>
            </div>

            <!-- RIGHT: CHAT -->
            <div class="game-card chat-card">
                <h3>💬 Chat</h3>
                <div class="chat-messages" id="chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Mensaje..." maxlength="50">
                    <button id="btn-send" class="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fade in effect
        window.addEventListener('load', () => {
            document.body.classList.add('loaded');
        });

        // Theme persistence
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('checkbox').checked = true;
        }

        document.getElementById('checkbox').addEventListener('change', function() {
            if (this.checked) {
                document.body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
            }
        });

        

        const socket = io();
        let myRoomCode = null;
        let myRole = null;
        let mySid = null;
        let isReady = false;
        let countdownInterval = null;

        // DOM Elements
        const menuSection = document.getElementById('menu-section');
        const lobbySection = document.getElementById('lobby-section');
        const displayRoomCode = document.getElementById('display-room-code');
        const lobbyStatus = document.getElementById('lobby-status');

        const p1Name = document.getElementById('p1-name');
        const p2Name = document.getElementById('p2-name');
        const p2Container = document.getElementById('p2-container');
        
        const btnReady = document.getElementById('btn-ready');
        const btnStart = document.getElementById('btn-start');
        
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const btnSend = document.getElementById('btn-send');
        
        const countdownLayer = document.getElementById('countdown-layer');
        const countdownNum = document.getElementById('countdown-num');

        // --- AVATAR LOGIC ---
        const stage = document.getElementById('avatar-stage');
        
        // Eye Tracking (Synchronized Pupil Movement)
        document.addEventListener('mousemove', (e) => {
            const faces = document.querySelectorAll('.face');
            
            faces.forEach(face => {
                // Skip if face has special state
                if (face.classList.contains('dizzy') || face.classList.contains('happy')) return;

                const eyes = face.querySelectorAll('.eye');
                
                eyes.forEach(eye => {
                    const pupil = eye.querySelector('.pupil');
                    if (!pupil) return;

                    const rect = eye.getBoundingClientRect();
                    const eyeCenterX = rect.left + (rect.width / 2);
                    const eyeCenterY = rect.top + (rect.height / 2);
                    
                    // Check if mouse is hovering the avatar cube (reset to center)
                    const cube = face.closest('.avatar-cube');
                    if (cube) {
                        const cubeRect = cube.getBoundingClientRect();
                        if (
                            e.clientX >= cubeRect.left && e.clientX <= cubeRect.right &&
                            e.clientY >= cubeRect.top && e.clientY <= cubeRect.bottom
                        ) {
                            pupil.style.transform = 'translate(-50%, -50%)';
                            return;
                        }
                    }
                    
                    // Calculate vector from eye center to mouse
                    const dx = e.clientX - eyeCenterX;
                    const dy = e.clientY - eyeCenterY;
                    
                    // Calculate angle
                    const angle = Math.atan2(dy, dx);
                    
                    // Max movement radius (eye is 26px, pupil is 12px, so max offset ~7px)
                    const maxOffset = 7;
                    const distance = Math.min(maxOffset, Math.hypot(dx, dy) / 15);
                    
                    // Calculate movement
                    const moveX = Math.cos(angle) * distance;
                    const moveY = Math.sin(angle) * distance;
                    
                    pupil.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
                });
            });
        });

        // Synchronized Blinking
        setInterval(() => {
            const faces = document.querySelectorAll('.face');
            faces.forEach(face => {
                if (Math.random() > 0.3) return; // 30% chance per face
                
                const eyes = face.querySelectorAll('.eye');
                eyes.forEach(eye => eye.classList.add('blink'));
                
                setTimeout(() => {
                    eyes.forEach(eye => eye.classList.remove('blink'));
                }, 200);
            });
        }, 3000);

        // Happy Click
        document.querySelectorAll('.avatar-cube').forEach(cube => {
            cube.addEventListener('click', () => {
                setFaceState(cube, 'happy');
                setTimeout(() => setFaceState(cube, 'normal'), 1000);
            });
        });

        function setFaceState(cube, state) {
            const face = cube.querySelector('.face');
            face.classList.remove('happy', 'dizzy');
            
            // Reset transforms when changing state
            const pupils = face.querySelectorAll('.pupil');
            pupils.forEach(p => p.style.transform = 'translate(0, 0)');
            
            if (state !== 'normal') face.classList.add(state);
        }

        // Jump Mechanics
        let jumpCharge = 0;
        let isCharging = false;
        let lastJumpTime = 0;
        const JUMP_COOLDOWN = 800;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement !== chatInput && !menuSection.classList.contains('hidden')) return;
            if (e.code === 'Space' && document.activeElement !== chatInput) {
                e.preventDefault();
                const now = Date.now();
                if (now - lastJumpTime < JUMP_COOLDOWN) return;
                
                if (!isCharging) {
                    isCharging = true;
                    jumpCharge = 0;
                    const myAvatar = myRole === 'host' ? document.getElementById('p1-avatar') : document.getElementById('p2-avatar');
                    myAvatar.classList.add('charging');
                    socket.emit('avatar_jump', { room_code: myRoomCode, type: 'charge' });
                    
                    // Charge loop
                    const chargeInterval = setInterval(() => {
                        if (!isCharging || jumpCharge >= 100) {
                            clearInterval(chargeInterval);
                            return;
                        }
                        jumpCharge += 5;
                    }, 50);
                }
            }
        });

        // Botón Comenzar Partida
        if (btnStart) {
            btnStart.addEventListener('click', () => {
                socket.emit('start_game', { room_code: myRoomCode });
            });
        }

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isCharging) {
                isCharging = false;
                lastJumpTime = Date.now();
                
                const myAvatar = myRole === 'host' ? document.getElementById('p1-avatar') : document.getElementById('p2-avatar');
                myAvatar.classList.remove('charging');
                
                // Calculate jump power
                const power = Math.min(jumpCharge, 100);
                const type = power > 50 ? 'super-jump' : 'jump';
                
                performJump(myAvatar, type);
                socket.emit('avatar_jump', { room_code: myRoomCode, type: type });
            }
        });

        function performJump(element, type) {
            element.classList.remove('jump', 'super-jump');
            void element.offsetWidth; // Reflow
            element.classList.add(type);
            
            if (type === 'super-jump') {
                setTimeout(() => {
                    setFaceState(element, 'dizzy');
                    setTimeout(() => setFaceState(element, 'normal'), 2000);
                }, 500); // Wait for landing roughly
            }
        }

        // --- SOCKET LOGIC ---

        socket.on('connect', () => {
             console.log('✅ Connected');
             mySid = socket.id;
        });

        // Escuchar cuando un jugador se pone listo
        socket.on('player_ready_update', (data) => {
            console.log('Player ready update:', data);
            
            // Identificar avatar basado en si soy yo o el rival
            let targetAvatarId = '';
            
            if (data.sid === mySid) {
                // Si soy yo, siempre soy el avatar de la izquierda (P1 visualmente) si soy host,
                // o el de la derecha (P2 visualmente) si soy guest?
                // Espera, la UI siempre muestra P1 a la izquierda y P2 a la derecha.
                // Si soy Host: Yo soy P1 (izq), Rival es P2 (der).
                // Si soy Guest: Yo soy P2 (der), Rival es P1 (izq).
                
                if (myRole === 'host') {
                    targetAvatarId = 'p1-avatar';
                } else {
                    targetAvatarId = 'p2-avatar';
                }
            } else {
                // Es el otro jugador
                if (myRole === 'host') {
                    targetAvatarId = 'p2-avatar'; // El otro es guest (der)
                } else {
                    targetAvatarId = 'p1-avatar'; // El otro es host (izq)
                }
            }
            
            const targetAvatar = document.getElementById(targetAvatarId);
            if (targetAvatar) {
                if (data.ready) {
                    targetAvatar.classList.add('ready-aura');
                } else {
                    targetAvatar.classList.remove('ready-aura');
                }
            }
        });

        // Escuchar cuando un jugador se desconecta
        socket.on('player_disconnected', (data) => {
            // En vez de alert, mensaje en el chat
            addSystemMessage(`⚠️ <strong>${data.username}</strong> se ha desconectado.`, '#ef4444');
        });

        // Create/Join
        document.getElementById('btn-create').addEventListener('click', () => {
            const username = "{{ session.get('username', 'Invitado') }}";
            socket.emit('create_room', { username: username });
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            const code = document.getElementById('room-code-input').value;
            if (!code) return alert("Introduce código");
            const username = "{{ session.get('username', 'Invitado') }}";
            socket.emit('join_room', { room_code: code, username: username });
        });

        // Hide/show logout button based on room state
        function updateAuthUI(inRoom) {
            const logoutBtn = document.getElementById('logout-link');
            if (logoutBtn) {
                logoutBtn.style.display = inRoom ? 'none' : 'inline-block';
            }
        }
        
        socket.on('room_created', (data) => {
            myRoomCode = data.room_code;
            myRole = 'host';
            setupLobby();
            p1Name.textContent = "{{ session.get('username', 'Invitado') }}";
            updateAuthUI(true);
        });

        function handleLobbyUpdate(data) {
            const players = data.players;
            
            // Update my role (in case I was promoted to host)
            const myPlayer = players.find(p => p.sid === mySid);
            if (myPlayer) {
                if (myRole !== 'host' && myPlayer.role === 'host') {
                    addSystemMessage("👑 <strong>¡Ahora eres el Host!</strong>", "#4ade80");
                }
                myRole = myPlayer.role;
            }

            setupLobby(); // Refresh buttons based on new role
            
            // Update UI based on players
            let hostFound = false;
            let guestFound = false;
            
            // Reset P2 display first
            p2Container.style.opacity = '0.5';
            p2Name.textContent = 'Esperando...';
            const p2Avatar = document.getElementById('p2-avatar');
            if(p2Avatar) p2Avatar.classList.remove('ready-aura');
            
            players.forEach(p => {
                if (p.role === 'host') {
                    hostFound = true;
                    p1Name.textContent = p.username;
                } else {
                    guestFound = true;
                    p2Container.style.opacity = '1';
                    p2Name.textContent = p.username;
                }
            });
            
            if (hostFound && guestFound) {
                lobbyStatus.textContent = "¡Sala llena! Esperando a que ambos estén listos...";
                if (myRole === 'host' && btnStart) btnStart.disabled = false;
            } else {
                lobbyStatus.textContent = "Esperando jugadores...";
                if (btnStart) btnStart.disabled = true;
            }
        }
        
        function addSystemMessage(text, color = '#fbbf24') {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.style.padding = '5px 10px';
            msgDiv.style.marginBottom = '5px';
            msgDiv.style.borderRadius = '5px';
            msgDiv.style.backgroundColor = 'rgba(0,0,0,0.2)';
            msgDiv.style.color = color;
            msgDiv.style.fontSize = '0.9rem';
            msgDiv.style.textAlign = 'center';
            msgDiv.innerHTML = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- SOCKET LOGIC ---
        socket.on('lobby_update', (data) => {
            handleLobbyUpdate(data);
        });

        socket.on('player_joined', (data) => {
            myRoomCode = myRoomCode || document.getElementById('room-code-input').value.toUpperCase();
            updateAuthUI(true);
            handleLobbyUpdate(data);
        });

        socket.on('player_ready_update', (data) => {
            const isMe = data.sid === mySid;
            const myAvatarIdx = myRole === 'host' ? 1 : 2;
            const targetIdx = isMe ? myAvatarIdx : (myAvatarIdx === 1 ? 2 : 1);
            
            const avatar = document.getElementById(`p${targetIdx}-avatar`);
            if (data.ready) {
                avatar.classList.add('ready-aura');
            } else {
                avatar.classList.remove('ready-aura');
            }

            // Chat Message & Counter
            const players = document.querySelectorAll('.avatar-cube'); // Count total players visually present? No, better use data from server if possible.
            // But we don't have full player list here easily without keeping state.
            // Let's just count how many have 'ready-aura' class
            
            setTimeout(() => { // Wait for DOM update
                const readyCount = document.querySelectorAll('.ready-aura').length;
                const totalPlayers = document.querySelectorAll('.avatar-container').length; // Should be 2 usually
                
                // Update Visual Counter
                const readyCountEl = document.getElementById('ready-count');
                if(readyCountEl) readyCountEl.textContent = `${readyCount}/2 Listos`;
                
                // Update Counter Text
                const readyBtn = document.getElementById('btn-ready');
                if(readyBtn) readyBtn.textContent = data.ready && isMe ? "¡LISTO!" : "ESTOY LISTO";
                
                // Add System Message
                // We need the username. We can get it from the DOM name element
                const nameEl = document.getElementById(`p${targetIdx}-name`);
                const username = nameEl ? nameEl.textContent : "Jugador";
                
                const color = data.ready ? '#4ade80' : '#fbbf24';
                const statusText = data.ready ? "está listo" : "ya no está listo";
                addSystemMessage(`ℹ️ <strong>${username}</strong> ${statusText}. (${readyCount}/2)`, color);
            }, 50);
        });

        socket.on('all_ready', (data) => {
            if (data.ready) {
                startCountdown();
            } else {
                cancelCountdown();
            }
        });

        function startCountdown() {
            countdownLayer.classList.remove('hidden');
            let count = 3;
            countdownNum.textContent = count;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNum.textContent = count;
                } else {
                    clearInterval(countdownInterval);
                    countdownNum.textContent = "GO!";
                    if (myRole === 'host') {
                        socket.emit('start_game', { room_code: myRoomCode });
                    }
                }
            }, 1000);
        }

        function cancelCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownLayer.classList.add('hidden');
            // Optional: Show message "Countdown cancelled"
        }

        socket.on('avatar_anim', (data) => {
            const otherAvatar = myRole === 'host' ? document.getElementById('p2-avatar') : document.getElementById('p1-avatar');
            
            if (data.type === 'charge') {
                otherAvatar.classList.add('charging');
            } else {
                otherAvatar.classList.remove('charging');
                performJump(otherAvatar, data.type);
            }
        });
        
        socket.on('chat_message', (data) => {
            const msg = document.createElement('div');
            msg.className = 'chat-msg';
            
            // Usar el color que envía el servidor
            const playerColor = data.color || '#ffffff'; // Blanco por defecto
            
            msg.innerHTML = `<strong style="color: ${playerColor}">${data.username}:</strong> ${data.message}`;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
        
        socket.on('game_started', () => {
            window.location.href = `/versus/${myRoomCode}`;
        });

        // --- ACTIONS ---
        
        function setupLobby() {
            menuSection.classList.add('hidden');
            lobbySection.classList.remove('hidden');
            displayRoomCode.textContent = myRoomCode;
        }

        btnReady.addEventListener('click', () => {
            socket.emit('toggle_ready', { room_code: myRoomCode });
            isReady = !isReady;
            btnReady.textContent = isReady ? "Cancelar" : "¡ESTOY LISTO!";
            btnReady.classList.toggle('secondary');
        });

        btnSend.addEventListener('click', sendChat);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });

        function sendChat() {
            const text = chatInput.value.trim();
            if(text) {
                socket.emit('chat_message', { room_code: myRoomCode, message: text });
                chatInput.value = '';
            }
        }
    </script>
    <script src="{{ url_for('static', filename='stars.js') }}"></script>
</body>
</html>
