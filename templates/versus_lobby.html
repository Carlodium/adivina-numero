<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Versus - Carlodium Arcade</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='versus.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Initialize Socket.IO with debug logs
        const socket = io({
            reconnectionAttempts: 5,
            timeout: 10000,
            transports: ['websocket', 'polling']
        });

        let myRoomCode = null;
        let myRole = null; // 'host' or 'guest'

        // DOM Elements
        const menuSection = document.getElementById('menu-section');
        const lobbySection = document.getElementById('lobby-section');
        const displayRoomCode = document.getElementById('display-room-code');
        const p1Name = document.getElementById('p1-name');
        const p2Name = document.getElementById('p2-name');
        const p2Wrapper = document.getElementById('p2-wrapper');
        const btnStart = document.getElementById('btn-start');
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const btnCreate = document.getElementById('btn-create');
        const btnJoin = document.getElementById('btn-join');

        // --- Connection Debugging ---
        socket.on('connect', () => {
            console.log('✅ Conectado al servidor SocketIO:', socket.id);
        });

        socket.on('connect_error', (err) => {
            console.error('❌ Error de conexión:', err);
            alert('Error conectando al servidor de juego. Revisa tu conexión.');
            btnCreate.textContent = "Crear Sala";
            btnCreate.disabled = false;
            btnJoin.textContent = "Unirse";
            btnJoin.disabled = false;
        });

        // --- Menu Actions ---
        btnCreate.addEventListener('click', () => {
            console.log('🖱️ Click en Crear Sala');
            btnCreate.textContent = "Creando...";
            btnCreate.disabled = true;
            const username = "{{ session.get('username', 'Invitado') }}";
            socket.emit('create_room', { username: username });
        });

        btnJoin.addEventListener('click', () => {
            console.log('🖱️ Click en Unirse');
            const code = document.getElementById('room-code-input').value;
            if (!code) {
                alert("Por favor, introduce un código de sala.");
                return;
            }
            
            btnJoin.textContent = "Uniéndose...";
            btnJoin.disabled = true;
            
            const username = "{{ session.get('username', 'Invitado') }}";
            socket.emit('join_room', { room_code: code, username: username });
        });

        // --- Socket Events ---
        socket.on('room_created', (data) => {
            console.log('🏠 Sala creada:', data);
            myRoomCode = data.room_code;
            myRole = 'host';
            showLobby();
            p1Name.textContent = "{{ session.get('username', 'Invitado') }}";
        });

        socket.on('player_joined', (data) => {
            console.log('👤 Jugador unido:', data);
            const players = data.players;
            myRoomCode = myRoomCode || document.getElementById('room-code-input').value.toUpperCase();
            
            showLobby();
            
            // Reset states
            p2Wrapper.style.opacity = '0.5';
            p2Name.textContent = 'Esperando...';

            players.forEach(p => {
                if (p.role === 'host') {
                    p1Name.textContent = p.username;
                } else {
                    p2Name.textContent = p.username;
                    p2Wrapper.style.opacity = '1';
                    if (myRole === 'host') btnStart.classList.remove('hidden');
                }
            });
        });

        socket.on('error', (data) => {
            console.error('⚠️ Error del servidor:', data);
            alert(data.message);
            // Reset buttons
            btnCreate.textContent = "Crear Sala";
            btnCreate.disabled = false;
            btnJoin.textContent = "Unirse";
            btnJoin.disabled = false;
        });

        socket.on('chat_message', (data) => {
            const msg = document.createElement('div');
            msg.className = 'chat-msg';
            msg.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        socket.on('avatar_jump', (data) => {
            if (data.sid !== socket.id) {
                const otherAvatar = myRole === 'host' ? document.getElementById('p2-avatar') : document.getElementById('p1-avatar');
                jumpAvatar(otherAvatar);
            }
        });

        socket.on('game_started', (data) => {
            console.log('🎮 Juego iniciado');
            window.location.href = `/versus/${myRoomCode}`;
        });

        // --- Interactions ---
        function showLobby() {
            menuSection.classList.add('hidden');
            lobbySection.classList.remove('hidden');
            displayRoomCode.textContent = myRoomCode;
        }

        // Chat
        document.getElementById('btn-send').addEventListener('click', sendChat);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });

        function sendChat() {
            const text = chatInput.value.trim();
            if(text) {
                socket.emit('chat_message', { room_code: myRoomCode, message: text });
                chatInput.value = '';
            }
        }

        // Jump
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement !== chatInput && !menuSection.classList.contains('hidden') === false) {
                e.preventDefault();
                const myAvatar = myRole === 'host' ? document.getElementById('p1-avatar') : document.getElementById('p2-avatar');
                jumpAvatar(myAvatar);
                socket.emit('avatar_jump', { room_code: myRoomCode });
            }
        });

        function jumpAvatar(element) {
            element.classList.remove('jumping');
            void element.offsetWidth; // Trigger reflow
            element.classList.add('jumping');
        }

        // Start Game
        btnStart.addEventListener('click', () => {
            socket.emit('start_game', { room_code: myRoomCode });
        });

        // Prevent FOUC
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('loaded');
        });

        // Clean disconnect on back
        window.addEventListener('beforeunload', () => {
            socket.disconnect();
        });
    </script>
</body>
</html>
