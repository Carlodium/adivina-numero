<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Versus - Carlodium Arcade</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='game.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='versus.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <!-- Theme Toggle -->
    <div class="theme-switch-wrapper" id="theme-toggle-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round">
                <div class="slider-knob">
                    <span class="icon-moon">🌙</span>
                    <span class="icon-sun">☀️</span>
                </div>
            </div>
        </label>
    </div>

    <!-- Auth Status (Top Right) - Username only during game -->
    <div class="game-auth-status">
      {% if session.get('user_id') %}
        <span class="username-display">👤 {{ session.get('username') }}</span>
        <!-- NO logout button during game -->
      {% endif %}
    </div>

    <!-- Dynamic Stars via stars.js -->

    <div class="container">
        <div class="game-card">
            <div class="versus-header">
                <div id="p1-indicator" class="turn-indicator">
                    <span id="p1-name">Jugador 1</span>
                    <span style="color: var(--primary); font-size: 0.8rem; margin-left: 0.5rem;">(P1)</span>
                </div>
                <div style="font-size: 1.5rem;">VS</div>
                <div id="p2-indicator" class="turn-indicator">
                    <span id="p2-name">Jugador 2</span>
                    <span style="color: #ef4444; font-size: 0.8rem; margin-left: 0.5rem;">(P2)</span>
                </div>
            </div>

            <div class="game-area" style="text-align: center;">
                <h1 style="margin-bottom: 1rem;">Adivina el Número (1-100)</h1>
                
                <div id="game-log" class="chat-messages" style="height: 200px; background: rgba(0,0,0,0.2);">
                    <!-- Game events go here -->
                </div>

                <div class="input-group" style="margin-top: 2rem;">
                    <input type="number" id="guess-input" placeholder="Tu número..." min="1" max="100" disabled>
                    <button id="btn-guess" class="play-btn" disabled>Adivinar</button>
                </div>
                
                <p id="status-msg" style="margin-top: 1rem; color: var(--text-muted);">Conectando...</p>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="coin-overlay hidden" style="background: rgba(0,0,0,0.95);">
        <h1 id="winner-text" style="font-size: 3rem; color: #fbbf24; margin-bottom: 1rem;">¡VICTORIA!</h1>
        <p style="color: white; font-size: 1.5rem;">El número era: <span id="secret-number" style="color: var(--primary);">42</span></p>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
            <button id="btn-rematch" class="play-btn">Volver a Jugar (<span id="rematch-count">0</span>/2)</button>
            <a href="/versus" class="play-btn" style="background: transparent; border: 1px solid white;">Salir</a>
        </div>
    </div>

    <script>
        const socket = io();
        const roomCode = "{{ room_code }}";
        
        // DOM Elements
        const p1NameEl = document.getElementById('p1-name');
        const p2NameEl = document.getElementById('p2-name');
        const guessInput = document.getElementById('guess-input');
        const btnGuess = document.getElementById('btn-guess');
        const gameLog = document.getElementById('game-log');
        const statusMsg = document.getElementById('status-msg');
        const gameOverModal = document.getElementById('game-over-modal');
        const btnRematch = document.getElementById('btn-rematch');
        const rematchCount = document.getElementById('rematch-count');

        // Theme persistence
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('checkbox').checked = true;
        }

        document.getElementById('checkbox').addEventListener('change', function() {
            if (this.checked) {
                document.body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
            }
        });

        // --- USERNAME MANAGEMENT ---
        // Only use unique ID for guests ("Jugador"). Logged in users use their session name.
        let clientUsername = "{{ session.get('username', 'Jugador') }}";
        
        if (clientUsername === 'Jugador') {
            // It's a guest, check/create persistent ID
            let storedName = sessionStorage.getItem('guest_username');
            if (!storedName) {
                storedName = 'Jugador_' + Math.floor(Math.random() * 10000);
                sessionStorage.setItem('guest_username', storedName);
            }
            clientUsername = storedName;
        }
        
        console.log('🆔 Identity:', clientUsername);

        // --- SOCKET EVENTS ---

        socket.on('connect', () => {
             console.log('✅ Connected');
             socket.emit('join_room', { room_code: roomCode, username: clientUsername });
        });

        socket.on('player_joined', (data) => {
            console.log('👥 Player Update:', data);
            updatePlayerNames(data);
            
            const count = data.players.length;
            if (count < 2) {
                updateStatus(`⏳ Esperando rival... (${count}/2)`);
            } else {
                // If we have 2 players, requesting start is safe
                socket.emit('start_game', { room_code: roomCode });
            }
        });

        socket.on('waiting_for_players', (data) => {
             updatePlayerNames(data);
             updateStatus(`⏳ Esperando rival... (${data.players.length}/2)`);
        });

        socket.on('game_started', (data) => {
            console.log('🎮 Game Started');
            gameOverModal.classList.add('hidden');
            gameLog.innerHTML = ''; // Clear log
            rematchCount.textContent = '0';
            btnRematch.disabled = false;
            btnRematch.textContent = `Volver a Jugar (0/2)`;

            updatePlayerNames(data);
            
            const starterName = data.player_names[data.first_turn];
            addSystemMessage(`📢 ¡Empieza <strong>${starterName}</strong>!`);
            
            updateTurnUI(data.first_turn);
        });

        const guessedNumbers = new Set();

        socket.on('turn_result', (data) => {
            guessedNumbers.add(data.guess);
            
            const isMe = data.player === socket.id;
            const color = isMe ? 'var(--primary)' : '#ef4444';
            const text = data.result === 'low' ? 'Muy bajo ⬆️' : 'Muy alto ⬇️';
            
            const msg = document.createElement('div');
            msg.className = 'chat-msg';
            msg.style.width = '100%';
            msg.style.textAlign = 'center';
            msg.innerHTML = `<span style="color:${color}">${isMe ? 'Tú' : 'Rival'}</span> dijo ${data.guess}: <strong>${text}</strong>`;
            
            gameLog.appendChild(msg);
            gameLog.scrollTop = gameLog.scrollHeight;

            updateTurnUI(data.next_turn);
        });

        socket.on('game_over', (data) => {
            const isWin = data.winner === socket.id;
            document.getElementById('winner-text').textContent = isWin ? "¡VICTORIA! 🏆" : "DERROTA 💀";
            document.getElementById('secret-number').textContent = data.number;
            gameOverModal.classList.remove('hidden');
            updateStatus("🏁 Partida terminada");
            guessedNumbers.clear(); // Reset for next game
        });
        
        socket.on('rematch_update', (data) => {
            rematchCount.textContent = data.votes;
            btnRematch.textContent = `Volver a Jugar (${data.votes}/2)`;
        });

        // --- DISCONNECT LOGIC ---
        let disconnectTimer = null;
        const DISCONNECT_TIMEOUT = 10000; // 10 seconds

        socket.on('player_left_gameroom', (data) => {
            console.log('⚠️ Player left:', data);
            
            // If game over modal is open, show message THERE
            if (!gameOverModal.classList.contains('hidden')) {
                btnRematch.style.display = 'none';
                
                // Check if message already exists
                if (!document.getElementById('modal-disconnect-msg')) {
                    const modalMsg = document.createElement('div');
                    modalMsg.id = 'modal-disconnect-msg';
                    modalMsg.style.color = '#ef4444';
                    modalMsg.style.marginTop = '1rem';
                    modalMsg.style.fontWeight = 'bold';
                    modalMsg.innerHTML = "⚠️ El rival ha abandonado. No hay revancha.";
                    
                    // Insert before buttons
                    const btnContainer = gameOverModal.querySelector('div');
                    gameOverModal.insertBefore(modalMsg, btnContainer);
                }
                return;
            }

            // In game notification
            const msgId = 'disconnect-warning';
            if (!document.getElementById(msgId)) {
                const msg = document.createElement('div');
                msg.id = msgId;
                msg.className = 'chat-msg system-msg';
                msg.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
                msg.innerHTML = "⚠️ <strong>Rival desconectado.</strong> Esperando...";
                gameLog.appendChild(msg);
            }

            // Start Timer
            if (disconnectTimer) clearTimeout(disconnectTimer);
            
            disconnectTimer = setTimeout(() => {
                // Show Claim Victory Button
                const claimBtn = document.createElement('button');
                claimBtn.id = 'btn-claim-victory';
                claimBtn.className = 'play-btn';
                claimBtn.style.background = '#ef4444';
                claimBtn.style.marginTop = '1rem';
                claimBtn.innerHTML = "🏆 Reclamar Victoria (Rival ausente)";
                claimBtn.onclick = () => {
                    socket.emit('claim_victory', { room_code: roomCode });
                };
                
                const warning = document.getElementById(msgId);
                if (warning) warning.appendChild(claimBtn);
                
            }, DISCONNECT_TIMEOUT);
        });

        // We need a way to know if they reconnected. 
        // Currently 'player_joined' might trigger, or we can listen to a new event.
        // For now, let's assume if we receive a 'player_joined' or any game update, they are back.
        // Actually, 'player_joined' is broadcasted when someone joins.
        
        socket.on('player_joined', () => {
            // Cancel disconnect timer
            if (disconnectTimer) {
                clearTimeout(disconnectTimer);
                disconnectTimer = null;
            }
            const warning = document.getElementById('disconnect-warning');
            if (warning) warning.remove();
            addSystemMessage("✅ <strong>Rival reconectado.</strong>");
            
            // Re-enable rematch if game over
            if (!gameOverModal.classList.contains('hidden')) {
                btnRematch.style.display = 'inline-block';
            }
        });

        // --- HELPERS ---

        function updatePlayerNames(data) {
            if (data.players && data.player_names) {
                const p1Sid = data.players[0];
                const p2Sid = data.players[1]; // Might be undefined
                
                if (p1Sid) p1NameEl.textContent = data.player_names[p1Sid];
                if (p2Sid) p2NameEl.textContent = data.player_names[p2Sid] || 'Esperando...';
                else p2NameEl.textContent = 'Esperando...';
            }
        }

        let isMyTurn = false;

        function updateTurnUI(currentTurnSid) {
            isMyTurn = currentTurnSid === socket.id;
            
            if (isMyTurn) {
                updateStatus("✨ ¡TU TURNO! Elige un número.");
                statusMsg.style.color = "var(--primary)";
                guessInput.disabled = false;
                btnGuess.disabled = false;
                guessInput.focus();
                document.body.style.borderColor = "var(--primary)";
            } else {
                updateStatus("⏳ Turno del rival...");
                statusMsg.style.color = "var(--text-muted)";
                guessInput.disabled = true;
                btnGuess.disabled = true;
                document.body.style.borderColor = "transparent";
            }
        }

        function updateStatus(msg) {
            statusMsg.textContent = msg;
        }

        function addSystemMessage(html) {
            const msg = document.createElement('div');
            msg.className = 'chat-msg system-msg';
            msg.style.width = '100%';
            msg.style.textAlign = 'center';
            msg.style.color = '#fbbf24';
            msg.innerHTML = html;
            gameLog.appendChild(msg);
        }

        function sendGuess() {
            const val = parseInt(guessInput.value);
            
            // Local Validation
            if (isNaN(val) || val < 1 || val > 100) {
                // Show temporary error in status
                const oldText = statusMsg.textContent;
                statusMsg.textContent = "❌ Introduce un número entre 1 y 100";
                statusMsg.style.color = "#ef4444";
                setTimeout(() => {
                    statusMsg.textContent = oldText;
                    statusMsg.style.color = "var(--primary)";
                }, 2000);
                return;
            }
            
            if (guessedNumbers.has(val)) {
                const oldText = statusMsg.textContent;
                statusMsg.textContent = "❌ ¡Ese número ya se ha dicho!";
                statusMsg.style.color = "#ef4444";
                setTimeout(() => {
                    statusMsg.textContent = oldText;
                    statusMsg.style.color = "var(--primary)";
                }, 2000);
                return;
            }

            if (val && isMyTurn) {
                socket.emit('make_guess', { room_code: roomCode, guess: val });
                guessInput.value = '';
            }
        }

        // --- ACTIONS ---
        btnGuess.addEventListener('click', sendGuess);
        guessInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendGuess(); });
        
        btnRematch.addEventListener('click', () => {
            socket.emit('vote_rematch', { room_code: roomCode });
            btnRematch.disabled = true;
            btnRematch.textContent = "Esperando al rival...";
        });

        // Prevent FOUC
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('loaded');
        });
    </script>
    <script src="{{ url_for('static', filename='stars.js') }}"></script>
</body>
</html>
